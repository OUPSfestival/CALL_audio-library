<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>CALL — Haltestellenschwärmerei</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="icon" type="image/svg+xml"
href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='40' fill='red'/%3E%3C/svg%3E">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  min-height:100%;
  background:#213722;
  color:#f4f1ea;
  font-family:'Inter',sans-serif;
  overflow:hidden;
}

/* ---------------- TOP IDENTITY (STATIC) ---------------- */

.top{
  position:fixed;
  top:0;
  width:100%;
  padding:22px;
  text-align:center;

  font-size:11px;
  letter-spacing:.08em;
  text-transform:uppercase;
  opacity:.9;
}

/* ---------------- CENTER ---------------- */

.wrap{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:90px;
  text-align:center;
  padding:120px 20px;
}

.action{
  cursor:pointer;
  display:flex;
  flex-direction:column;
  gap:14px;
  transition:.25s ease;
}

.action:hover{
  transform:translateY(-3px);
  opacity:.75;
}

.title{
  font-size:72px;
  line-height:1;
  letter-spacing:-0.05em;
  text-transform:uppercase;
  font-weight:600;
}

.sub{
  font-size:12px;
  letter-spacing:.08em;
  text-transform:uppercase;
  opacity:.55;
}

/* ---------------- BOTTOM MOVING DESCRIPTION ---------------- */

.bottom{
  position:fixed;
  bottom:0;
  width:100%;
  padding:18px 0;
  overflow:hidden;
}

.marquee{
  display:inline-block;
  white-space:nowrap;

  font-size:16px;
  letter-spacing:.06em;
  text-transform:uppercase;

  padding-left:100%;

  animation:scroll 70s linear infinite;
}

@keyframes scroll{
  0%{ transform:translateX(0); }
  100%{ transform:translateX(-100%); }
}

.paused{
  animation-play-state:paused !important;
}

/* ---------------- FILE ---------------- */

#file-input{
  display:none;
}

/* ---------------- MOBILE ---------------- */

@media(max-width:700px){
  .title{
    font-size:44px;
  }

  .marquee{
    font-size:14px;
  }
}

</style>
</head>

<body>

<!-- TOP (STATIC IDENTITY) -->
<div class="top">
  MANUEL PHIL. BISCHOF — FÜR HALTESTELLENSCHWÄRMEREI — 2026
</div>

<!-- CENTER -->
<div class="wrap">

  <div class="action" onclick="document.getElementById('file-input').click()">
    <div class="title">SEND CALL</div>
    <div class="sub">hochladen deines rufs</div>
  </div>

  <div class="action" onclick="togglePlay()">
    <div class="title">CALL BACK</div>
    <div class="sub">horche dein echo</div>
  </div>

</div>

<!-- BOTTOM (MOVING DESCRIPTION) -->
<div class="bottom">
  <div class="marquee" id="marquee">
    Ein offenes Audio-Archiv für kollektive Feldaufnahmen — jede Spur wird Teil eines sich langsam bewegenden Klangspeichers zwischen Stimmen, Orten und Zeit —
  </div>
</div>

<!-- FILE -->
<input type="file" id="file-input" accept="audio/*" multiple />

<script>

// ---------------- AUDIO ----------------

const WORKER_URL =
"https://audio-api.manuelbischof-phil.workers.dev/";

const BUCKET_PUBLIC_URL =
"https://pub-f2d160b705314fd1afd1421680f3cb6a.r2.dev";

let trackList = [];
let currentAudio = null;
let isPlaying = false;
let interval;

async function load(){
  try{
    const res = await fetch(`${WORKER_URL}/list`);
    const data = await res.json();

    trackList = data.files.map(n => ({
      name:n,
      url:`${BUCKET_PUBLIC_URL}/${encodeURIComponent(n)}`
    }));
  }catch(e){}
}

load();

// ---------------- PLAY ----------------

function togglePlay(){
  isPlaying ? stop() : play();
}

function play(){

  if(!trackList.length) return;

  stop();

  const track = trackList[Math.floor(Math.random()*trackList.length)];
  const audio = new Audio(track.url);

  currentAudio = audio;

  audio.addEventListener("loadedmetadata", () => {

    const start = Math.random() * Math.max(0, audio.duration - 30);

    audio.currentTime = start;
    audio.play();

    isPlaying = true;

    interval = setInterval(() => {
      if(audio.currentTime - start >= 30) stop();
    }, 500);

  });

  audio.addEventListener("ended", stop);
}

function stop(){
  if(currentAudio){
    currentAudio.pause();
    currentAudio = null;
  }

  clearInterval(interval);
  isPlaying = false;
}

// ---------------- HOLD TO PAUSE DESCRIPTION ----------------

const marquee = document.getElementById("marquee");

function pause(){
  marquee.classList.add("paused");
}

function resume(){
  marquee.classList.remove("paused");
}

document.addEventListener("mousedown", pause);
document.addEventListener("mouseup", resume);
document.addEventListener("touchstart", pause);
document.addEventListener("touchend", resume);

</script>

</body>
</html>
