<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Haltestellen schreierei</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&display=swap" rel="stylesheet">

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3CradialGradient id='g' cx='50%25' cy='50%25' r='60%25'%3E%3Cstop offset='0%25' stop-color='%23ff6b6b'/%3E%3Cstop offset='100%25' stop-color='%23a01414'/%3E%3C/radialGradient%3E%3C/defs%3E%3Cellipse cx='50' cy='50' rx='42' ry='26' fill='url(%23g)'/%3E%3C/svg%3E">
  
<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,
body{
  width:100%;
  min-height:100%;
  background:#2e5988;
  color:#111;
  font-family:'Inter',sans-serif;
  overflow-x:hidden;
  overflow-y:auto;
}

body{
  position:relative;
}

/* ---------------- TOP MARQUEE ---------------- */

.top{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  overflow:hidden;
  padding:18px 0;
  z-index:30;
}

.marquee{
  display:inline-block;
  white-space:nowrap;
  font-size:20px;
  letter-spacing:.06em;
  text-transform:uppercase;
  padding-left:100%;
  animation:scroll 30s linear infinite;
  opacity:.85;
}

@keyframes scroll{
  0%{
    transform:translateX(0);
  }
  100%{
    transform:translateX(-100%);
  }
}

.paused{
  animation-play-state:paused !important;
}

/* ---------------- CENTER ---------------- */

.wrap{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:30px;
  text-align:center;
  padding:120px 20px;
  position:relative;
  z-index:10;
}

/* ---------------- ACTION ---------------- */

.action{
  cursor:pointer;
  display:flex;
  flex-direction:column;
  align-items:center;
  transition:.25s ease;
}

.action:hover{
  transform:translateY(-4px);
  opacity:.75;
}

/* ---------------- ARC TYPO ---------------- */

.arc-text{
  width:580px;
  max-width:100%;
  height:300px;
  display:block;
}

.arc-big{
  font-size:66px;
  letter-spacing:.10em;
  text-transform:uppercase;
  fill:#111;
  font-weight:800;
}

.arc-small{
  font-size:17px;
  letter-spacing:.04em;
  text-transform:uppercase;
  fill:#bfbb99;
  opacity:.80;
}

/* ---------------- BOTTOM BAR ---------------- */

.bottom{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  padding:22px 28px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:11px;
  letter-spacing:.12em;
  text-transform:uppercase;
  z-index:30;
}

.bottom-center{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
}

.bottom-right{
  margin-left:auto;
  text-align:right;
}

a{
  text-decoration:none;
  color:inherit;
}

/* ---------------- FILE ---------------- */

#file-input{
  display:none;
}

/* ---------------- FLOATING IMAGES ---------------- */

.floating-img{
  position:fixed;
  top:0;
  left:0;
  width:22vw;
  max-width:100px;
  min-width:60px;
  pointer-events:none;
  z-index:20;
  opacity:0.9;
  transition:transform 8s linear;
  will-change:transform;
}

/* ---------------- MOBILE ---------------- */


@media(max-width:700px){

  .wrap{
    gap:20px;
    padding:100px 16px;
  }

  .arc-text{
    width:320px;
    height:260px;
  }

  /* keep proportions */
  .arc-big{
    font-size:47px;
  }

  .arc-small{
    font-size:18px;
    letter-spacing:.04em;
  }

  .marquee{
    font-size:20px;
  }

 .bottom{
  padding:14px 12px;
  font-size:10px;
  letter-spacing:.05em;
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  gap:10px;
}

/* make all items behave consistently */
.bottom > div{
  display:flex;
  flex-direction:column;
}

/* center stays centered but flexible */
.bottom-center{
  max-width:100px;
  text-align:center;
}

/* keep year readable */
.bottom-right{
  font-size:9px;
  text-align:right;
}

/* links slightly stronger for readability */
.bottom a{
  font-size:9px;
  line-height:1.2;
}

  /* floating images slightly smaller */
  .floating-img{
    width:18vw;
    min-width:50px;
    max-width:80px;
  }
}

</style>
</head>

<body>

<!-- FLOATING IMAGES -->
<img src="images/call1.png" class="floating-img" id="img1" alt="">
<img src="images/call2.png" class="floating-img" id="img2" alt="">

<!-- TOP MARQUEE -->
<div class="top">
  <div class="marquee">
    Teile deinen Ruf als Sprachnachricht per [SEND CALL]   -   und mit dem Link [CALL BACK] kannst du echo anhören..
  </div>
</div>

<!-- CENTER -->
<div class="wrap">

  <div class="action" onclick="document.getElementById('file-input').click()">

   <svg viewBox="0 0 400 260" class="arc-text">

  <defs>
    <path id="sendPath" d="M 20 90 Q 200 10 380 90" />
  </defs>

  <text class="arc-big">
    <textPath href="#sendPath" startOffset="50%" text-anchor="middle">
      SEND CALL
    </textPath>
  </text>

  <text class="arc-small">
    <textPath href="#sendPath" startOffset="50%" text-anchor="middle">
      Schicke deinen Ruf in die digitalen Täler,
    </textPath>
  </text>


    </svg>

  </div>

  <div class="action" id="play-action" onclick="togglePlay()">



     <svg viewBox="0 0 400 260" class="arc-text">

  <defs>
    <path id="backPath" d="M 20 170 Q 200 250 380 170" />
  </defs>

  <text class="arc-big">
    <textPath href="#backPath" startOffset="50%" text-anchor="middle">
      CALL BACK
    </textPath>
  </text>

  <text class="arc-small">
    <textPath href="#backPath" startOffset="50%" text-anchor="middle">
      nun Höre dein Echo
    </textPath>
  </text>

</svg>


  </div>

</div>

<!-- BOTTOM -->
<div class="bottom">

  <div>
    <a href="https://www.instagram.com/manuel.phil.bischof/" target="_blank" rel="noopener">
      MANUEL PHIL. BISCHOF
    </a>
  </div>

  <div class="bottom-center">
    <a href="https://kulturlandsgemeinde.ch/festival/mitwirkende/manuel-philipp-bischof/" target="_blank" rel="noopener">
      FÜR HALTESTELLENSCHREIEREI
    </a>
  </div>

  <div class="bottom-right">
    2026
  </div>

</div>

<input type="file" id="file-input" accept="audio/*" multiple />

<script>

const images = document.querySelectorAll('.floating-img');

images.forEach((img, index) => {

  // START: immer Bildschirmmitte
  moveToCenter(img);

  // dann erst Bewegung starten
  setTimeout(() => {
    setRandomPosition(img);

    setInterval(() => {
      setRandomPosition(img);
    }, 8000 + (index * 1000));

  }, 500); // kurzer delay für sauberen Start

});

function moveToCenter(el){

  const size = el.offsetWidth || 100;

  const centerX = (window.innerWidth / 2) - (size / 2);
  const centerY = (window.innerHeight / 2) - (size / 2);

  el.style.transform = `
    translate(${centerX}px, ${centerY}px)
    rotate(0deg)
  `;
}

function setRandomPosition(el){

  const size = el.offsetWidth || 100;

  const maxX = window.innerWidth - size;
  const maxY = window.innerHeight - size;

  const randomX = Math.random() * maxX;
  const randomY = Math.random() * maxY;

  const randomRotate = Math.random() * 360;

  el.style.transform = `
    translate(${randomX}px, ${randomY}px)
    rotate(${randomRotate}deg)
  `;
}

</script>

</body>
</html>
