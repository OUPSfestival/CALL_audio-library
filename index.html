<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Haltestellen schreierei</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&display=swap" rel="stylesheet">

<link rel="icon" type="image/svg+xml"
href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3CradialGradient id='r' cx='50%25' cy='50%25' r='50%25'%3E%3Cstop offset='0%25' stop-color='%23ff4a4a' stop-opacity='1'/%3E%3Cstop offset='40%25' stop-color='%23ff2f2f' stop-opacity='0.95'/%3E%3Cstop offset='75%25' stop-color='%23c81f1f' stop-opacity='0.7'/%3E%3Cstop offset='100%25' stop-color='%23a01414' stop-opacity='0'/%3E%3C/radialGradient%3E%3C/defs%3E%3Ccircle cx='50' cy='50' r='35' fill='url(%23r)'/%3E%3C/svg%3E">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  min-height:100%;
  background:#f4f1ea;
  color:#111;
  font-family:'Inter',sans-serif;
  overflow:hidden;
}

/* ---------------- TOP MARQUEE ---------------- */

.top{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  overflow:hidden;
  padding:18px 0;
}

.marquee{
  display:inline-block;
  white-space:nowrap;
  font-size:20px;
  letter-spacing:.06em;
  text-transform:uppercase;
  padding-left:100%;
  animation:scroll 110s linear infinite;
  opacity:.85;
}

@keyframes scroll{
  0%{ transform:translateX(0); }
  100%{ transform:translateX(-100%); }
}

.paused{
  animation-play-state:paused !important;
}

/* ---------------- CENTER ---------------- */

.wrap{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:40px; /* 🔥 reduced from 100px */
  text-align:center;
  padding:120px 20px;
}

.action{
  cursor:pointer;
  display:flex;
  flex-direction:column;
  align-items:center;
  transition:.25s ease;
}

.action:hover{
  transform:translateY(-4px);
  opacity:.75;
}

/* slight pairing tweak */
#play-action{
  transform: translateY(-20px);
}

/* ---------------- ARC TYPO (BIGGER) ---------------- */

.arc-text{
  width:680px;
  height:300px;
  display:block;
}

.arc-big{
  font-size:58px;
  letter-spacing:.05em;
  text-transform:uppercase;
  fill:#111;
  font-weight:800;
}

.arc-small{
  font-size:18px;
  letter-spacing:.04em;
  text-transform:uppercase;
  fill:#111;
  opacity:.65;
}

/* ---------------- BOTTOM BAR ---------------- */

.bottom{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  padding:22px 28px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:11px;
  letter-spacing:.12em;
  text-transform:uppercase;
}

.bottom-center{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
}

/* ---------------- FILE ---------------- */

#file-input{
  display:none;
}

/* ---------------- MOBILE ---------------- */

@media(max-width:700px){
  .arc-text{
    width:360px;
    height:180px;
  }

  .arc-big{
    font-size:34px;
  }

  .arc-small{
    font-size:12px;
  }
}

</style>
</head>

<body>

<!-- TOP MARQUEE -->
<div class="top">
  <div class="marquee">
    An open audio archive for collective field recordings — each upload becomes part of a drifting sonic memory system — a continuous listening space between voices, places and time —
  </div>
</div>

<!-- CENTER -->
<div class="wrap">

  <!-- SEND CALL -->
  <div class="action" onclick="document.getElementById('file-input').click()">

    <svg viewBox="0 0 400 260" class="arc-text">

      <defs>
        <path id="sendPath"
          d="M 20 40 Q 200 240 380 40" />
      </defs>

      <text class="arc-big">
        <textPath href="#sendPath" startOffset="50%" text-anchor="middle">
          SEND CALL
        </textPath>
      </text>

      <text class="arc-small">
        <textPath href="#sendPath" startOffset="50%" text-anchor="middle">
          hochladen deines rufs
        </textPath>
      </text>

    </svg>

  </div>

  <!-- CALL BACK -->
  <div class="action" id="play-action" onclick="togglePlay()">

    <svg viewBox="0 0 400 260" class="arc-text">

      <defs>
        <path id="backPath"
          d="M 20 240 Q 200 20 380 240" />
      </defs>

      <text class="arc-big">
        <textPath href="#backPath" startOffset="50%" text-anchor="middle">
          CALL BACK
        </textPath>
      </text>

      <text class="arc-small">
        <textPath href="#backPath" startOffset="50%" text-anchor="middle">
          horche dein echo
        </textPath>
      </text>

    </svg>

  </div>

</div>

<!-- BOTTOM BAR -->
<div class="bottom">

  <div>
    <a href="https://www.instagram.com/manuel.phil.bischof/" target="_blank" rel="noopener">
      MANUEL PHIL. BISCHOF
    </a>
  </div>

  <div class="bottom-center">

    <div>
      <a href="https://kulturlandsgemeinde.ch/festival/mitwirkende/manuel-philipp-bischof/" target="_blank" rel="noopener">
        FÜR HALTESTELLENSCHREIEREI
      </a>
    </div>

    <div>2026</div>

  </div>

</div>

<!-- FILE INPUT -->
<input type="file" id="file-input" accept="audio/*" multiple />

<script>

// ---------------- AUDIO SYSTEM ----------------

const WORKER_URL =
"https://audio-api.manuelbischof-phil.workers.dev/";

const BUCKET_PUBLIC_URL =
"https://pub-f2d160b705314fd1afd1421680f3cb6a.r2.dev";

let trackList = [];
let currentAudio = null;
let isPlaying = false;
let interval;

const fileInput = document.getElementById("file-input");

async function load(){

  try{

    const res = await fetch(`${WORKER_URL}/list`);
    if(!res.ok) return;

    const data = await res.json();

    trackList = data.files.map(n => ({
      name:n,
      url:`${BUCKET_PUBLIC_URL}/${encodeURIComponent(n)}`
    }));

  }catch(e){}

}

load();

fileInput.addEventListener("change", () => {
  [...fileInput.files].forEach(upload);
  fileInput.value = "";
});

async function upload(file){

  await fetch(`${WORKER_URL}/upload/${encodeURIComponent(file.name)}`,{
    method:"PUT",
    body:file
  });

  trackList.push({
    name:file.name,
    url:`${BUCKET_PUBLIC_URL}/${encodeURIComponent(file.name)}`
  });

}

function togglePlay(){
  isPlaying ? stop() : play();
}

function play(){

  if(!trackList.length) return;

  stop();

  const track = trackList[Math.floor(Math.random()*trackList.length)];
  const audio = new Audio(track.url);

  currentAudio = audio;

  audio.addEventListener("loadedmetadata", () => {

    const start = Math.random() * Math.max(0, audio.duration - 30);

    audio.currentTime = start;
    audio.play();

    isPlaying = true;

    interval = setInterval(() => {
      if(audio.currentTime - start >= 30) stop();
    }, 500);

  });

  audio.addEventListener("ended", stop);
}

function stop(){
  if(currentAudio){
    currentAudio.pause();
    currentAudio = null;
  }
  clearInterval(interval);
  isPlaying = false;
}

/* ---------------- HOLD TO PAUSE MARQUEE ---------------- */

const marquee = document.querySelector(".marquee");

if(marquee){

  marquee.addEventListener("mousedown", () => {
    marquee.classList.add("paused");
  });

  marquee.addEventListener("mouseup", () => {
    marquee.classList.remove("paused");
  });

  marquee.addEventListener("mouseleave", () => {
    marquee.classList.remove("paused");
  });

  marquee.addEventListener("touchstart", () => {
    marquee.classList.add("paused");
  }, { passive:true });

  marquee.addEventListener("touchend", () => {
    marquee.classList.remove("paused");
  });

}

</script>

</body>
</html>
