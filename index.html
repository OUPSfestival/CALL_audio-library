<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>CALL — Haltestellenschwärmerei</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  min-height:100%;
  background:#f4f1ea;
  color:#111;
  font-family:'Inter',sans-serif;
}

/* ---------------- TOP ---------------- */

.top{
  position:fixed;
  top:0;
  width:100%;
  text-align:center;
  padding:22px;
  font-size:11px;
  letter-spacing:.14em;
  text-transform:uppercase;
  opacity:.7;
}

/* ---------------- BOTTOM ---------------- */

.bottom{
  position:fixed;
  bottom:0;
  width:100%;
  text-align:center;
  padding:22px;
  font-size:11px;
  letter-spacing:.08em;
  text-transform:uppercase;
}

.bottom a{
  color:#111;
  text-decoration:none;
  border-bottom:1px solid rgba(0,0,0,.3);
}

/* ---------------- CENTER LAYOUT ---------------- */

.wrap{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:90px;
  text-align:center;
  padding:120px 20px;
}

/* ---------------- ACTION BLOCKS ---------------- */

.action{
  cursor:pointer;
  display:flex;
  flex-direction:column;
  gap:14px;
  transition:.2s ease;
}

.action:hover{
  transform:translateY(-3px);
  opacity:.7;
}

/* BIG TYPO */

.title{
  font-size:72px;
  line-height:1;
  letter-spacing:-0.05em;
  text-transform:uppercase;
  font-weight:600;
}

/* SMALL LINE */

.sub{
  font-size:12px;
  letter-spacing:.08em;
  text-transform:uppercase;
  opacity:.55;
}

/* MOBILE */

@media(max-width:700px){

  .title{
    font-size:44px;
  }

}

</style>
</head>

<body>

<!-- TOP -->
<div class="top">
  FÜR HALTESTELLENSCHWÄRMEREI
</div>

<!-- CENTER -->
<div class="wrap">

  <!-- SEND -->
  <div class="action" onclick="document.getElementById('file-input').click()">

    <div class="title">SEND CALL</div>

    <div class="sub">hochladen deines rufs</div>

  </div>

  <!-- PLAY -->
  <div class="action" id="play-action" onclick="togglePlay()">

    <div class="title">CALL BACK</div>

    <div class="sub">horche dein echo</div>

  </div>

</div>

<!-- BOTTOM -->
<div class="bottom">
  <a href="https://www.instagram.com/manuel.phil.bischof/" target="_blank">
    MANUEL PHIL. BISCHOF
  </a>
  — 2026
</div>

<!-- FILE INPUT -->
<input type="file" id="file-input" accept="audio/*" multiple />

<script>

// ---------------- AUDIO SYSTEM ----------------

const WORKER_URL =
"https://audio-api.manuelbischof-phil.workers.dev/";

const BUCKET_PUBLIC_URL =
"https://pub-f2d160b705314fd1afd1421680f3cb6a.r2.dev";

let trackList = [];
let currentAudio = null;
let isPlaying = false;
let interval;

const fileInput = document.getElementById("file-input");
const playAction = document.getElementById("play-action");

async function load(){

  try{

    const res = await fetch(`${WORKER_URL}/list`);
    if(!res.ok) return;

    const data = await res.json();

    trackList = data.files.map(n => ({
      name:n,
      url:`${BUCKET_PUBLIC_URL}/${encodeURIComponent(n)}`
    }));

  }catch(e){}

}

load();

fileInput.addEventListener("change", () => {
  [...fileInput.files].forEach(upload);
  fileInput.value = "";
});

async function upload(file){

  await fetch(`${WORKER_URL}/upload/${encodeURIComponent(file.name)}`,{
    method:"PUT",
    body:file
  });

  trackList.push({
    name:file.name,
    url:`${BUCKET_PUBLIC_URL}/${encodeURIComponent(file.name)}`
  });

}

function togglePlay(){
  isPlaying ? stop() : play();
}

function play(){

  if(!trackList.length) return;

  stop();

  const track = trackList[Math.floor(Math.random()*trackList.length)];
  const audio = new Audio(track.url);

  currentAudio = audio;

  audio.addEventListener("loadedmetadata", () => {

    const start = Math.random() * Math.max(0, audio.duration - 30);

    audio.currentTime = start;
    audio.play();

    isPlaying = true;

    interval = setInterval(() => {
      if(audio.currentTime - start >= 30) stop();
    }, 500);

  });

  audio.addEventListener("ended", stop);

}

function stop(){

  if(currentAudio){
    currentAudio.pause();
    currentAudio = null;
  }

  clearInterval(interval);
  isPlaying = false;

}

</script>

</body>
</html>
