<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Haltestellen schreierei</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&display=swap" rel="stylesheet">

<style>

/* ---------------- RESET ---------------- */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html, body{
  width:100%;
  min-height:100%;
  background:#f4f1ea;
  color:#111;
  font-family:'Inter', sans-serif;
  overflow-x:hidden;
}

/* ---------------- MARQUEE ---------------- */

.top{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  overflow:hidden;
  padding:18px 0;
}

.marquee{
  white-space:nowrap;
  display:inline-block;
  font-size:18px;
  letter-spacing:.06em;
  text-transform:uppercase;
  padding-left:100%;
  animation:scroll 100s linear infinite;
  opacity:.8;
}

@keyframes scroll{
  0%{ transform:translateX(0); }
  100%{ transform:translateX(-100%); }
}

/* ---------------- CENTER ---------------- */

.wrap{
  min-height:100vh;

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;

  gap:40px;

  padding:100px 20px;
  text-align:center;
}

/* ---------------- ACTION ---------------- */

.action{
  cursor:pointer;
  display:flex;
  flex-direction:column;
  align-items:center;
  transition:.2s ease;
}

.action:hover{
  transform:translateY(-3px);
  opacity:.75;
}

/* ---------------- ARC ---------------- */

.arc-text{
  width:620px;
  max-width:100%;
  height:auto;
  display:block;
}

.arc-big{
  font-size:54px;
  letter-spacing:.08em;
  font-weight:800;
  fill:#111;
  text-transform:uppercase;
}

.arc-small{
  font-size:16px;
  opacity:.6;
  fill:#111;
  text-transform:uppercase;
}

/* ---------------- BOTTOM BAR ---------------- */

.bottom{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;

  padding:18px 20px;

  display:flex;
  justify-content:space-between;
  align-items:center;

  font-size:11px;
  letter-spacing:.12em;
  text-transform:uppercase;
}

.bottom-center{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
}

.bottom-right{
  margin-left:auto;
}

a{
  color:inherit;
  text-decoration:none;
}

/* ---------------- FILE INPUT ---------------- */

#file-input{
  display:none;
}

/* ---------------- MOBILE ---------------- */

@media(max-width:700px){

  .wrap{
    gap:25px;
    padding:120px 16px 90px;
  }

  .arc-text{
    width:320px;
  }

  .arc-big{
    font-size:32px;
  }

  .arc-small{
    font-size:12px;
  }

  .marquee{
    font-size:14px;
  }

  .bottom{
    font-size:10px;
  }
}

</style>
</head>

<body>

<!-- TOP MARQUEE -->
<div class="top">
  <div class="marquee">
    An open audio archive for collective field recordings — each upload becomes part of a drifting sonic memory system — a continuous listening space between voices, places and time —
  </div>
</div>

<!-- CENTER -->
<div class="wrap">

  <!-- SEND CALL -->
  <div class="action" onclick="document.getElementById('file-input').click()">

    <svg viewBox="0 0 400 260" class="arc-text">

      <defs>
        <path id="sendPath" d="M 20 40 Q 200 240 380 40" />
      </defs>

      <text class="arc-big">
        <textPath href="#sendPath" startOffset="50%" text-anchor="middle">
          SEND CALL
        </textPath>
      </text>

      <text class="arc-small">
        <textPath href="#sendPath" startOffset="50%" text-anchor="middle">
          hochladen deines rufs
        </textPath>
      </text>

    </svg>

  </div>

  <!-- CALL BACK -->
  <div class="action" id="play-action" onclick="togglePlay()">

    <svg viewBox="0 0 400 260" class="arc-text">

      <defs>
        <path id="backPath" d="M 20 240 Q 200 20 380 240" />
      </defs>

      <text class="arc-big">
        <textPath href="#backPath" startOffset="50%" text-anchor="middle">
          CALL BACK
        </textPath>
      </text>

      <text class="arc-small">
        <textPath href="#backPath" startOffset="50%" text-anchor="middle">
          horche dein echo
        </textPath>
      </text>

    </svg>

  </div>

</div>

<!-- BOTTOM -->
<div class="bottom">

  <div>
    <a href="https://www.instagram.com/manuel.phil.bischof/" target="_blank" rel="noopener">
      MANUEL PHIL. BISCHOF
    </a>
  </div>

  <div class="bottom-center">
    <a href="https://kulturlandsgemeinde.ch/festival/mitwirkende/manuel-philipp-bischof/" target="_blank" rel="noopener">
      FÜR HALTESTELLENSCHREIEREI
    </a>
  </div>

  <div class="bottom-right">
    2026
  </div>

</div>

<!-- FILE INPUT -->
<input type="file" id="file-input" accept="audio/*" multiple />

<script>

/* AUDIO (unchanged, safe) */

const WORKER_URL = "https://audio-api.manuelbischof-phil.workers.dev/";
const BUCKET_PUBLIC_URL = "https://pub-f2d160b705314fd1afd1421680f3cb6a.r2.dev";

let trackList = [];
let currentAudio = null;
let isPlaying = false;
let interval;

const fileInput = document.getElementById("file-input");

async function load(){
  try{
    const res = await fetch(`${WORKER_URL}/list`);
    if(!res.ok) return;

    const data = await res.json();

    trackList = data.files.map(n => ({
      name:n,
      url:`${BUCKET_PUBLIC_URL}/${encodeURIComponent(n)}`
    }));
  }catch(e){}
}

load();

fileInput.addEventListener("change", () => {
  [...fileInput.files].forEach(upload);
  fileInput.value = "";
});

async function upload(file){
  await fetch(`${WORKER_URL}/upload/${encodeURIComponent(file.name)}`,{
    method:"PUT",
    body:file
  });

  trackList.push({
    name:file.name,
    url:`${BUCKET_PUBLIC_URL}/${encodeURIComponent(file.name)}`
  });
}

function togglePlay(){
  isPlaying ? stop() : play();
}

function play(){

  if(!trackList.length) return;

  stop();

  const track = trackList[Math.floor(Math.random()*trackList.length)];
  const audio = new Audio(track.url);

  currentAudio = audio;

  audio.addEventListener("loadedmetadata", () => {

    const start = Math.random() * Math.max(0, audio.duration - 30);

    audio.currentTime = start;
    audio.play();

    isPlaying = true;

    interval = setInterval(() => {
      if(audio.currentTime - start >= 30) stop();
    }, 500);

  });

  audio.addEventListener("ended", stop);
}

function stop(){
  if(currentAudio){
    currentAudio.pause();
    currentAudio = null;
  }
  clearInterval(interval);
  isPlaying = false;
}

/* MARQUEE */

const marquee = document.querySelector(".marquee");

if(marquee){
  marquee.addEventListener("mousedown", () => marquee.classList.add("paused"));
  marquee.addEventListener("mouseup", () => marquee.classList.remove("paused"));
  marquee.addEventListener("mouseleave", () => marquee.classList.remove("paused"));
  marquee.addEventListener("touchstart", () => marquee.classList.add("paused"), {passive:true});
  marquee.addEventListener("touchend", () => marquee.classList.remove("paused"));
}

</script>

</body>
</html>
