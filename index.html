<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CALL — Haltestellenschwärmerei</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: #1a3faa;
      color: #e8e4d8;
      font-family: 'Archivo Black', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 28px 16px;
      border-bottom: 1px solid rgba(232,228,216,0.2);
      flex-shrink: 0;
    }
    nav a {
      font-size: 13px;
      color: #e8e4d8;
      text-decoration: none;
      letter-spacing: 0.02em;
    }
    nav a:hover { text-decoration: underline; }
    .nav-right {
      display: flex;
      gap: 28px;
      align-items: center;
    }
    .nav-right span {
      font-size: 12px;
      letter-spacing: 0.04em;
      color: rgba(232,228,216,0.55);
    }
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 80px;
      padding: 60px 28px;
    }
    .action {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
    }
    .action .icon {
      font-size: 96px;
      line-height: 1;
      transition: transform 0.15s;
    }
    .action:hover .icon { transform: scale(1.06); }
    .action:active .icon { transform: scale(0.97); }
    .action .label {
      font-size: 12px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #e8e4d8;
    }
    #play-action .play-icon { display: block; }
    #play-action .stop-icon { display: none; }
    #play-action.playing .play-icon { display: none; }
    #play-action.playing .stop-icon { display: block; }
    #play-action.playing .label { color: rgba(232,228,216,0.5); }
    #toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #e8e4d8;
      color: #1a3faa;
      font-family: 'Archivo Black', sans-serif;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 12px 28px;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      white-space: nowrap;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    #file-input { display: none; }
    @media (max-width: 480px) {
      main { gap: 48px; padding: 40px 20px; }
      .action .icon { font-size: 72px; }
      .nav-right span:first-child { display: none; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="https://www.instagram.com/manuel.phil.bischof/" target="_blank" rel="noopener">Manuel Phil. Bischof</a>
    <div class="nav-right">
      <span>CALL for Haltestellenschwärmerei</span>
      <span>About</span>
    </div>
  </nav>

  <main>
    <div class="action" id="upload-action" onclick="document.getElementById('file-input').click()">
      <div class="icon">⛰️</div>
      <div class="label">Send Call</div>
    </div>
    <input type="file" id="file-input" accept="audio/*" multiple />

    <div class="action" id="play-action" onclick="togglePlay()">
      <div class="icon play-icon">▶</div>
      <div class="icon stop-icon">■</div>
      <div class="label">Play Call</div>
    </div>
  </main>

  <div id="toast"></div>

  <script>
    // ============================================================
    //  CONFIGURATION — fill these in
    // ============================================================
    const WORKER_URL        = "https://audio-api.manuelbischof-phil.workers.dev/";
    const BUCKET_PUBLIC_URL = "https://pub-f2d160b705314fd1afd1421680f3cb6a.r2.dev";
    // ============================================================

    let trackList        = [];
    let currentAudio     = null;
    let progressInterval = null;
    let isPlaying        = false;

    const fileInput  = document.getElementById("file-input");
    const playAction = document.getElementById("play-action");

    async function loadExistingFiles() {
      try {
        const res  = await fetch(`${WORKER_URL}/list`);
        if (!res.ok) return;
        const data = await res.json();
        trackList  = data.files.map(name => ({
          name,
          url: `${BUCKET_PUBLIC_URL}/${encodeURIComponent(name)}`
        }));
      } catch (e) {}
    }
    loadExistingFiles();

    fileInput.addEventListener("change", () => {
      const files = [...fileInput.files].filter(f => f.type.startsWith("audio/"));
      if (!files.length) return;
      files.forEach(uploadFile);
      fileInput.value = "";
    });

    async function uploadFile(file) {
      try {
        const res = await fetch(`${WORKER_URL}/upload/${encodeURIComponent(file.name)}`, {
          method: "PUT",
          body: file,
          headers: { "Content-Type": file.type || "audio/mpeg" }
        });
        if (!res.ok) throw new Error(await res.text());
        const url = `${BUCKET_PUBLIC_URL}/${encodeURIComponent(file.name)}`;
        if (!trackList.find(t => t.name === file.name)) {
          trackList.push({ name: file.name, url });
        }
        showToast("Call is out");
      } catch (e) {
        showToast("Upload failed");
      }
    }

    function togglePlay() {
      if (isPlaying) {
        stopClip();
      } else {
        playRandomClip();
      }
    }

    function playRandomClip() {
      if (!trackList.length) {
        showToast("No calls yet");
        return;
      }
      stopClip();
      const track = trackList[Math.floor(Math.random() * trackList.length)];
      const audio = new Audio(track.url);
      audio.crossOrigin = "anonymous";
      currentAudio = audio;

      audio.addEventListener("loadedmetadata", () => {
        const duration = audio.duration;
        const maxStart = Math.max(0, duration - 30);
        const start    = Math.random() * maxStart;
        audio.currentTime = start;
        audio.play();
        isPlaying = true;
        playAction.classList.add("playing");
        progressInterval = setInterval(() => {
          if (audio.currentTime - start >= 30) stopClip();
        }, 500);
      });

      audio.addEventListener("ended", stopClip);
      audio.addEventListener("error", () => { stopClip(); showToast("Could not play"); });
    }

    function stopClip() {
      if (currentAudio) { currentAudio.pause(); currentAudio = null; }
      clearInterval(progressInterval);
      isPlaying = false;
      playAction.classList.remove("playing");
    }

    let toastTimeout;
    function showToast(msg) {
      const toast = document.getElementById("toast");
      toast.textContent = msg;
      toast.classList.add("show");
      clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => toast.classList.remove("show"), 2500);
    }
  </script>

</body>
</html>
