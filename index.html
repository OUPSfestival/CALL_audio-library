<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>CALL — Haltestellenschwärmerei</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  min-height:100%;
  background:#f4f1ea;
  color:#111;
  font-family:'Inter',sans-serif;
}

/* ---------------- TOP ---------------- */

.top{
  position:fixed;
  top:0;
  width:100%;
  padding:22px 28px;
  text-align:center;
  font-size:11px;
  letter-spacing:.12em;
  text-transform:uppercase;
}

/* ---------------- BOTTOM ---------------- */

.bottom{
  position:fixed;
  bottom:0;
  width:100%;
  padding:22px 28px;
  display:flex;
  justify-content:center;
  font-size:11px;
  letter-spacing:.08em;
  text-transform:uppercase;
}

.bottom a{
  color:#111;
  text-decoration:none;
  border-bottom:1px solid rgba(0,0,0,.3);
}

/* ---------------- GRID ---------------- */

.wrapper{
  min-height:100vh;
  display:grid;
  grid-template-columns:repeat(12,1fr);
  align-items:center;
  padding:120px 40px;
}

/* LEFT ACTION */

.left{
  grid-column:2 / 6;
  display:flex;
  flex-direction:column;
  gap:10px;
  cursor:pointer;
}

.right{
  grid-column:8 / 12;
  display:flex;
  flex-direction:column;
  gap:10px;
  cursor:pointer;
}

.label{
  font-size:11px;
  opacity:.4;
  text-transform:uppercase;
  letter-spacing:.1em;
}

.title{
  font-size:42px;
  line-height:1;
  letter-spacing:-0.04em;
  text-transform:uppercase;
}

.sub{
  font-size:12px;
  opacity:.6;
}

/* hover minimal */

.left:hover,
.right:hover{
  opacity:.7;
  transform:translateY(-2px);
  transition:.2s ease;
}

/* PLAY STATE */

.playing{
  opacity:.6;
}

/* MOBILE */

@media(max-width:900px){

  .wrapper{
    grid-template-columns:1fr;
    gap:80px;
    padding:140px 20px;
  }

  .left,.right{
    grid-column:auto;
  }

}

</style>
</head>

<body>

<!-- TOP -->
<div class="top">
  FÜR HALTESTELLENSCHWÄRMEREI
</div>

<!-- GRID -->
<div class="wrapper">

  <!-- UPLOAD -->
  <div class="left" onclick="document.getElementById('file-input').click()">

    <div class="label">01 / Upload / Hochladen</div>

    <div class="title">
      Send Call<br>
      Call Senden
    </div>

    <div class="sub">
      Upload audio / Audio hochladen
    </div>

  </div>

  <!-- PLAY -->
  <div class="right" id="play-action" onclick="togglePlay()">

    <div class="label">02 / Playback / Wiedergabe</div>

    <div class="title">
      Call Playback<br>
      Call Wiedergabe
    </div>

    <div class="sub">
      Random playback / Zufällige Wiedergabe
    </div>

  </div>

</div>

<!-- BOTTOM -->
<div class="bottom">
  <a href="https://www.instagram.com/manuel.phil.bischof/" target="_blank">
    MANUEL PHIL. BISCHOF
  </a>
  &nbsp;— 2026
</div>

<!-- FILE -->
<input type="file" id="file-input" accept="audio/*" multiple />

<script>

// ---------------- AUDIO SYSTEM ----------------

const WORKER_URL =
"https://audio-api.manuelbischof-phil.workers.dev/";

const BUCKET_PUBLIC_URL =
"https://pub-f2d160b705314fd1afd1421680f3cb6a.r2.dev";

let trackList = [];
let currentAudio = null;
let isPlaying = false;
let interval;

const fileInput = document.getElementById("file-input");
const playAction = document.getElementById("play-action");

async function load(){
  try{
    const res = await fetch(`${WORKER_URL}/list`);
    if(!res.ok) return;

    const data = await res.json();

    trackList = data.files.map(n => ({
      name:n,
      url:`${BUCKET_PUBLIC_URL}/${encodeURIComponent(n)}`
    }));

  }catch(e){}
}

load();

fileInput.addEventListener("change", () => {
  [...fileInput.files].forEach(upload);
  fileInput.value = "";
});

async function upload(file){

  const res = await fetch(`${WORKER_URL}/upload/${encodeURIComponent(file.name)}`,{
    method:"PUT",
    body:file
  });

  if(res.ok){
    trackList.push({
      name:file.name,
      url:`${BUCKET_PUBLIC_URL}/${encodeURIComponent(file.name)}`
    });
  }

}

function togglePlay(){
  isPlaying ? stop() : play();
}

function play(){

  if(!trackList.length) return;

  stop();

  const track = trackList[Math.floor(Math.random()*trackList.length)];
  const audio = new Audio(track.url);
  currentAudio = audio;

  audio.addEventListener("loadedmetadata", () => {

    const start = Math.random() * Math.max(0, audio.duration - 30);

    audio.currentTime = start;
    audio.play();

    isPlaying = true;
    playAction.classList.add("playing");

    interval = setInterval(() => {
      if(audio.currentTime - start >= 30) stop();
    }, 500);

  });

  audio.addEventListener("ended", stop);

}

function stop(){

  if(currentAudio){
    currentAudio.pause();
    currentAudio = null;
  }

  clearInterval(interval);
  isPlaying = false;
  playAction.classList.remove("playing");

}

</script>

</body>
</html>
