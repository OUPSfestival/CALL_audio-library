<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Haltestellen schreierei</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  min-height:100%;
  background:#2e5988;
  color:#111;
  font-family:'Inter',sans-serif;
  overflow-x:hidden;
}

/* ---------------- TOP ---------------- */

.top{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  padding:48px 0 18px 0;
  z-index:30;
  overflow:hidden;
}

.marquee{
  white-space:nowrap;
  font-size:20px;
  padding-left:100%;
  animation:scroll 30s linear infinite;
}

@keyframes scroll{
  0%{transform:translateX(0);}
  100%{transform:translateX(-100%);}
}

/* ---------------- CENTER ---------------- */

.wrap{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:30px;
  text-align:center;
  padding:120px 20px;
}

/* ---------------- ACTION ---------------- */

.action{
  cursor:pointer;
  transition:.25s ease;
}

.action:hover{
  opacity:.75;
}

/* ---------------- ARC ---------------- */

.arc-text{
  width:580px;
  max-width:100%;
  height:300px;
}

.arc-big{
  font-size:66px;
  fill:#111;
  font-weight:800;
}

.arc-small{
  font-size:17px;
  fill:#bfbb99;
  opacity:.8;
}

/* ---------------- SCROLL SECTION ---------------- */

.scroll-section{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding-top:80px;
}

.bottom-images{
  width:100%;
}

.bottom-images img{
  width:100%;
  height:auto;
  display:block;

  /* reveal animation */
  transform:translateY(60px);
  opacity:0;
  transition:all 1s ease;
}

.bottom-images img.show{
  transform:translateY(0);
  opacity:1;
}

/* ---------------- BOTTOM BAR ---------------- */

.bottom{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  padding:22px 28px;
  display:flex;
  justify-content:space-between;
  font-size:11px;
}

/* ---------------- RECORD BUTTON ---------------- */

#recordBtn{
  position:fixed;
  top:18px;
  right:18px;
  width:16px;
  height:16px;
  border-radius:50%;
  background:red;
  z-index:9999;
  cursor:pointer;
  box-shadow:0 0 10px rgba(255,0,0,0.6);
}

#recordBtn.recording{
  background:darkred;
  transform:scale(1.2);
}

</style>
</head>

<body>

<!-- 🔴 RECORD -->
<div id="recordBtn"></div>

<!-- TOP -->
<div class="top">
  <div class="marquee">
    Lade deinen Ruf als Sprachnachricht hoch und teile ihn mit uns. Über CALL BACK hörst du ein Echo.
  </div>
</div>

<!-- CENTER -->
<div class="wrap">

  <!-- SEND -->
  <div class="action" onclick="document.getElementById('file-input').click()">
    <svg viewBox="0 0 400 260" class="arc-text">
      <defs>
        <path id="sendPath" d="M 20 40 Q 200 240 380 40" />
      </defs>

      <text class="arc-big">
        <textPath href="#sendPath" startOffset="50%" text-anchor="middle">
          SEND CALL
        </textPath>
      </text>

      <text class="arc-small">
        <textPath href="#sendPath" startOffset="50%" text-anchor="middle">
          Schicke deinen Ruf in die digitalen Täler
        </textPath>
      </text>
    </svg>
  </div>

  <!-- CALL BACK -->
  <div class="action">
    <svg viewBox="0 0 400 260" class="arc-text">
      <defs>
        <path id="backPath" d="M 20 240 Q 200 20 380 240" />
      </defs>

      <text class="arc-big">
        <textPath href="#backPath" startOffset="50%" text-anchor="middle">
          CALL BACK
        </textPath>
      </text>

      <text class="arc-small">
        <textPath href="#backPath" startOffset="50%" text-anchor="middle">
          nun Höre dein Echo
        </textPath>
      </text>
    </svg>
  </div>

</div>

<!-- SCROLL IMAGES -->
<div class="scroll-section">
  <div class="bottom-images">
    <img src="images/call1.png" alt="">
    <img src="images/call2.png" alt="">
  </div>
</div>

<!-- BOTTOM -->
<div class="bottom">
  <div>MANUEL PHIL. BISCHOF</div>
  <div>FÜR HALTESTELLENSCHREIEREI</div>
  <div>2026</div>
</div>

<!-- FILE INPUT -->
<input type="file" id="file-input" accept="audio/*">

<script>

/* ---------------- IMAGE REVEAL ---------------- */

const imgs = document.querySelectorAll(".bottom-images img");

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add("show");
    }
  });
}, { threshold: 0.2 });

imgs.forEach(img => observer.observe(img));

/* ---------------- RECORDING ---------------- */

let mediaRecorder;
let chunks = [];
let isRecording = false;

const btn = document.getElementById("recordBtn");

btn.addEventListener("click", async () => {

  if (!isRecording) {

    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

    mediaRecorder = new MediaRecorder(stream);
    chunks = [];

    mediaRecorder.ondataavailable = (e) => {
      chunks.push(e.data);
    };

    mediaRecorder.onstop = async () => {

      const blob = new Blob(chunks, { type: "audio/webm" });

      const formData = new FormData();
      formData.append("file", blob, "recording.webm");

      await fetch("https://audio-api.manuelbischof-phil.workers.dev/", {
        method: "POST",
        body: formData
      });

      stream.getTracks().forEach(track => track.stop());
    };

    mediaRecorder.start();
    isRecording = true;
    btn.classList.add("recording");

  } else {
    mediaRecorder.stop();
    isRecording = false;
    btn.classList.remove("recording");
  }
});

</script>

</body>
</html>
