<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Haltestellen schreierei</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  min-height:100%;
  background:#efe8dc;
  color:#111;
  font-family:'Inter',sans-serif;
  overflow-x:hidden;
}

/* ---------------- TOP MARQUEE ---------------- */

.top{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  overflow:hidden;
  padding:18px 0;
}

.marquee{
  display:inline-block;
  white-space:nowrap;
  font-size:20px;
  letter-spacing:.06em;
  text-transform:uppercase;
  padding-left:100%;
  animation:scroll 110s linear infinite;
  opacity:.85;
}

@keyframes scroll{
  0%{ transform:translateX(0); }
  100%{ transform:translateX(-100%); }
}

.paused{
  animation-play-state:paused !important;
}

/* ---------------- CENTER ---------------- */

.wrap{
  min-height:100vh;
  min-height:100dvh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:30px;
  text-align:center;
  padding:80px 20px;
}

/* ---------------- ACTION ---------------- */

.action{
  cursor:pointer;
  display:flex;
  flex-direction:column;
  align-items:center;
  transition:.25s ease;
}

.action:hover{
  transform:translateY(-4px);
  opacity:.75;
}

/* ---------------- ARC TYPO ---------------- */

.arc-text{
  width:680px;
  max-width:100%;
  height:300px;
  display:block;
}

.arc-big{
  font-size:58px;
  letter-spacing:.10em;
  text-transform:uppercase;
  fill:#111;
  font-weight:800;
}

.arc-small{
  font-size:18px;
  letter-spacing:.04em;
  text-transform:uppercase;
  fill:#111;
  opacity:.65;
}

/* ---------------- BOTTOM BAR ---------------- */

.bottom{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  padding:22px 28px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:11px;
  letter-spacing:.12em;
  text-transform:uppercase;
}

.bottom-center{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
}

.bottom-right{
  margin-left:auto;
  text-align:right;
}

a{
  text-decoration:none;
  color:inherit;
}

/* ---------------- FILE ---------------- */

#file-input{
  display:none;
}

/* ---------------- MOBILE ---------------- */

@media(max-width:700px){

  .wrap{
    gap:20px;
    padding:70px 16px;
  }

  .arc-text{
    width:320px;
    height:170px;
  }

  .arc-big{
    font-size:34px;
  }

  .arc-small{
    font-size:12px;
  }

  .marquee{
    font-size:14px;
  }

  .bottom{
    padding:16px 14px;
    font-size:10px;
  }
}

</style>
</head>

<body>

<!-- TOP MARQUEE -->
<div class="top">
  <div class="marquee">
    An open audio archive for collective field recordings — each upload becomes part of a drifting sonic memory system — a continuous listening space between voices, places and time —
  </div>
</div>

<!-- CENTER -->
<div class="wrap">

  <div class="action" onclick="document.getElementById('file-input').click()">
    <svg viewBox="0 0 400 260" class="arc-text">
      <defs>
        <path id="sendPath" d="M 20 40 Q 200 240 380 40" />
      </defs>

      <text class="arc-big">
        <textPath href="#sendPath" startOffset="50%" text-anchor="middle">
          SEND CALL
        </textPath>
      </text>

      <text class="arc-small">
        <textPath href="#sendPath" startOffset="50%" text-anchor="middle">
          hochladen deines rufs
        </textPath>
      </text>
    </svg>
  </div>

  <div class="action" id="play-action" onclick="togglePlay()">
    <svg viewBox="0 0 400 260" class="arc-text">
      <defs>
        <path id="backPath" d="M 20 240 Q 200 20 380 240" />
      </defs>

      <text class="arc-big">
        <textPath href="#backPath" startOffset="50%" text-anchor="middle">
          CALL BACK
        </textPath>
      </text>

      <text class="arc-small">
        <textPath href="#backPath" startOffset="50%" text-anchor="middle">
          horche dein echo
        </textPath>
      </text>
    </svg>
  </div>

</div>

<!-- BOTTOM -->
<div class="bottom">

  <div>
    <a href="https://www.instagram.com/manuel.phil.bischof/" target="_blank" rel="noopener">
      MANUEL PHIL. BISCHOF
    </a>
  </div>

  <div class="bottom-center">
    <a href="https://kulturlandsgemeinde.ch/festival/mitwirkende/manuel-philipp-bischof/" target="_blank" rel="noopener">
      FÜR HALTESTELLENSCHREIEREI
    </a>
  </div>

  <div class="bottom-right">
    2026
  </div>

</div>

<input type="file" id="file-input" accept="audio/*" multiple />

<script>
// (your JS unchanged)
</script>

</body>
</html>
