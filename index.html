<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Haltestellenschwärmerei</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&display=swap" rel="stylesheet">
<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  min-height:100%;
  background:#2e5988;
  color:#111;
  font-family:'Inter',sans-serif;
  overflow-x:hidden;
}

/* ---------------- TOP MARQUEE ---------------- */

.top{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  padding:48px 0 18px 0;
  z-index:30;
  overflow:hidden;
}

.marquee{
  white-space:nowrap;
  font-size:20px;
  padding-left:100%;
  animation:scroll 30s linear infinite;
}

@keyframes scroll{
  0%{transform:translateX(0);}
  100%{transform:translateX(-100%);}
}

/* ---------------- CENTER ---------------- */

.wrap{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:30px;
  text-align:center;
  padding:120px 20px;
}

/* ---------------- ACTION ---------------- */

.action{
  cursor:pointer;
  transition:.25s ease;
}

.action:hover{
  opacity:.75;
}

/* ---------------- ARC ---------------- */

.arc-text{
  width:580px;
  max-width:100%;
  height:300px;
}

.arc-big{
  font-size:66px;
  fill:#111;
  font-weight:800;
}

.arc-small{
  font-size:17px;
  fill:#bfbb99;
  opacity:.8;
}

/* ---------------- SCROLL SECTION ---------------- */

.scroll-section{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding-top:80px;
}

.bottom-images{
  width:100%;
}

.bottom-images img{
  width:100%;
  height:auto;
  display:block;
  transform:translateY(60px);
  opacity:0;
  transition:all 1s ease;
}

.bottom-images img.show{
  transform:translateY(0);
  opacity:1;
}

/* ---------------- BOTTOM BAR ---------------- */

.bottom{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  padding:22px 28px;
  display:flex;
  justify-content:space-between;
  font-size:11px;
}

/* ---------------- RECORD BUTTON ---------------- */

#recordBtn{
  position:fixed;
  top:18px;
  right:18px;
  width:16px;
  height:16px;
  border-radius:50%;
  background:red;
  z-index:9999;
  cursor:pointer;
  box-shadow:0 0 10px rgba(255,0,0,0.6);
  transition: transform 0.2s;
}

#recordBtn.recording{
  background:darkred;
  transform:scale(1.2);
}

/* ---------------- TOAST ---------------- */

#toast{
  position:fixed;
  bottom:60px;
  left:50%;
  transform:translateX(-50%) translateY(20px);
  background:#111;
  color:#bfbb99;
  font-family:'Inter',sans-serif;
  font-size:12px;
  font-weight:600;
  letter-spacing:0.15em;
  text-transform:uppercase;
  padding:12px 28px;
  opacity:0;
  transition:opacity 0.3s, transform 0.3s;
  pointer-events:none;
  white-space:nowrap;
  z-index:9999;
}

#toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

/* ---------------- PLAY STATE ---------------- */

#callBackAction .stop-hint{
  display:none;
  font-size:13px;
  fill:#bfbb99;
  opacity:0.7;
}

#callBackAction.playing .arc-big{
  fill:#bfbb99;
}

</style>
</head>

<body>

<!-- 🔴 RECORD BUTTON -->
<div id="recordBtn" title="Click to record"></div>

<!-- TOP MARQUEE -->
<div class="top">
  <div class="marquee">
    Lade deinen Ruf als Sprachnachricht hoch und teile ihn mit uns. Über CALL BACK hörst du ein Echo.
  </div>
</div>

<!-- CENTER -->
<div class="wrap">

  <!-- SEND CALL — file upload -->
  <div class="action" onclick="document.getElementById('file-input').click()">
    <svg viewBox="0 0 400 260" class="arc-text">
      <defs>
        <path id="sendPath" d="M 20 40 Q 200 240 380 40" />
      </defs>
      <text class="arc-big">
        <textPath href="#sendPath" startOffset="50%" text-anchor="middle">
          SEND CALL
        </textPath>
      </text>
      <text class="arc-small">
        <textPath href="#sendPath" startOffset="50%" text-anchor="middle">
          Schicke deinen Ruf in die digitalen Täler
        </textPath>
      </text>
    </svg>
  </div>

  <!-- CALL BACK — play random clip -->
  <div class="action" id="callBackAction" onclick="togglePlay()">
    <svg viewBox="0 0 400 260" class="arc-text">
      <defs>
        <path id="backPath" d="M 20 240 Q 200 20 380 240" />
      </defs>
      <text class="arc-big">
        <textPath href="#backPath" startOffset="50%" text-anchor="middle">
          CALL BACK
        </textPath>
      </text>
      <text class="arc-small">
        <textPath href="#backPath" startOffset="50%" text-anchor="middle">
          nun höre dein Echo
        </textPath>
      </text>
    </svg>
  </div>

</div>

<!-- SCROLL IMAGES -->
<div class="scroll-section">
  <div class="bottom-images">
    <img src="images/call1.png" alt="">
    <img src="images/call2.png" alt="">
  </div>
</div>

<!-- BOTTOM BAR -->
<div class="bottom">
  <div>MANUEL PHIL. BISCHOF</div>
  <div>FÜR HALTESTELLENSCHREIEREI</div>
  <div>2026</div>
</div>

<!-- FILE INPUT (hidden) -->
<input type="file" id="file-input" accept="audio/*">

<!-- TOAST -->
<div id="toast"></div>

<script>

// ============================================================
//  CONFIGURATION — your real URLs
// ============================================================
const WORKER_URL        = "https://audio-api.manuelbischof-phil.workers.dev";
const BUCKET_PUBLIC_URL = "https://pub-f2d160b705314fd1afd1421680f3cb6a.r2.dev"; 
// ============================================================

let trackList        = [];
let currentAudio     = null;
let progressInterval = null;
let isPlaying        = false;

// --- Load existing files from R2 on page load ---
async function loadTracks() {
  try {
    const res  = await fetch(`${WORKER_URL}/list`);
    if (!res.ok) return;
    const data = await res.json();
    trackList  = data.files.map(name => ({
      name,
      url: `${BUCKET_PUBLIC_URL}/${encodeURIComponent(name)}`
    }));
  } catch (e) {
    // silent — user can still upload
  }
}
loadTracks();

// --- FILE UPLOAD (SEND CALL button) ---
document.getElementById("file-input").addEventListener("change", async function () {
  const file = this.files[0];
  if (!file) return;
  this.value = "";

  const filename = "upload-" + Date.now() + "-" + file.name;

  try {
    const res = await fetch(`${WORKER_URL}/upload/${encodeURIComponent(filename)}`, {
      method: "PUT",
      body: file,
      headers: { "Content-Type": file.type || "audio/mpeg" }
    });
    if (!res.ok) throw new Error(await res.text());
    trackList.push({ name: filename, url: `${BUCKET_PUBLIC_URL}/${encodeURIComponent(filename)}` });
    showToast("Call is out");
  } catch (e) {
    showToast("Upload failed");
  }
});

// --- RECORDING (red button) ---
let mediaRecorder;
let chunks = [];
let isRecording = false;

const recordBtn = document.getElementById("recordBtn");

recordBtn.addEventListener("click", async () => {

  if (!isRecording) {

    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);
      chunks = [];

      mediaRecorder.ondataavailable = (e) => {
        if (e.data.size > 0) chunks.push(e.data);
      };

      mediaRecorder.onstop = async () => {
        const blob     = new Blob(chunks, { type: "audio/webm" });
        const filename = "recording-" + Date.now() + ".webm";

        try {
          const res = await fetch(`${WORKER_URL}/upload/${encodeURIComponent(filename)}`, {
            method: "PUT",
            body: blob,
            headers: { "Content-Type": "audio/webm" }
          });
          if (!res.ok) throw new Error(await res.text());
          trackList.push({ name: filename, url: `${BUCKET_PUBLIC_URL}/${encodeURIComponent(filename)}` });
          showToast("Call is out");
        } catch (e) {
          showToast("Upload failed");
        }

        stream.getTracks().forEach(track => track.stop());
      };

      mediaRecorder.start();
      isRecording = true;
      recordBtn.classList.add("recording");

    } catch (e) {
      showToast("Microphone not available");
    }

  } else {
    mediaRecorder.stop();
    isRecording = false;
    recordBtn.classList.remove("recording");
  }
});

// --- PLAY / STOP (CALL BACK button) ---
function togglePlay() {
  if (isPlaying) {
    stopClip();
  } else {
    playRandomClip();
  }
}

function playRandomClip() {
  if (!trackList.length) {
    showToast("No calls yet");
    return;
  }

  stopClip();

  const track = trackList[Math.floor(Math.random() * trackList.length)];
  const audio = new Audio(track.url);
  audio.crossOrigin = "anonymous";
  currentAudio = audio;

  audio.addEventListener("loadedmetadata", () => {
    const duration = audio.duration;
    const maxStart = Math.max(0, duration - 30);
    const start    = Math.random() * maxStart;
    audio.currentTime = start;
    audio.play();

    isPlaying = true;
    document.getElementById("callBackAction").classList.add("playing");

    progressInterval = setInterval(() => {
      if (audio.currentTime - start >= 30) stopClip();
    }, 500);
  });

  audio.addEventListener("ended", stopClip);
  audio.addEventListener("error", () => { stopClip(); showToast("Could not play"); });
}

function stopClip() {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  clearInterval(progressInterval);
  isPlaying = false;
  document.getElementById("callBackAction").classList.remove("playing");
}

// --- IMAGE REVEAL on scroll ---
const imgs = document.querySelectorAll(".bottom-images img");
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) entry.target.classList.add("show");
  });
}, { threshold: 0.2 });
imgs.forEach(img => observer.observe(img));

// --- TOAST ---
let toastTimeout;
function showToast(msg) {
  const toast = document.getElementById("toast");
  toast.textContent = msg;
  toast.classList.add("show");
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => toast.classList.remove("show"), 2500);
}

</script>
</body>
</html>
