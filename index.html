<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>CALL — Haltestellenschwärmerei</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="icon" type="image/svg+xml"
href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3CradialGradient id='r' cx='50%25' cy='50%25' r='50%25'%3E%3Cstop offset='0%25' stop-color='%238b1f1f' stop-opacity='1'/%3E%3Cstop offset='70%25' stop-color='%236b1a1a' stop-opacity='0.8'/%3E%3Cstop offset='100%25' stop-color='%236b1a1a' stop-opacity='0'/%3E%3C/radialGradient%3E%3C/defs%3E%3Ccircle cx='50' cy='50' r='35' fill='url(%23r)'/%3E%3C/svg%3E">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  min-height:100%;
  background:#f4f1ea;
  color:#111;
  font-family:'Inter',sans-serif;
  overflow:hidden;
}

/* ---------------- TOP MARQUEE ---------------- */

.top{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  overflow:hidden;
  padding:18px 0;
}

.marquee{
  display:inline-block;
  white-space:nowrap;
  font-size:20px;
  letter-spacing:.06em;
  text-transform:uppercase;

  padding-left:100%;
  animation:scroll 110s linear infinite;
  opacity:.8;
}

@keyframes scroll{
  0%{ transform:translateX(0); }
  100%{ transform:translateX(-100%); }
}

.paused{
  animation-play-state:paused !important;
}

/* ---------------- CENTER ---------------- */

.wrap{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:90px;
  text-align:center;
  padding:120px 20px;
}

.action{
  cursor:pointer;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:14px;
  transition:.25s ease;
}

.action:hover{
  transform:translateY(-3px);
  opacity:.7;
}

/* ---------------- ARC TYPO ---------------- */

.arc-text{
  width:420px;
  height:180px;
  display:block;
}

.arc{
  font-size:42px;
  letter-spacing:.08em;
  text-transform:uppercase;
  fill:#111;
}

/* ---------------- SUB ---------------- */

.sub{
  font-size:12px;
  letter-spacing:.08em;
  text-transform:uppercase;
  opacity:.55;
}

/* ---------------- BOTTOM BAR ---------------- */

.bottom{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;

  padding:22px 28px;

  display:flex;
  justify-content:space-between;
  align-items:center;

  font-size:11px;
  letter-spacing:.12em;
  text-transform:uppercase;
}

.bottom-center{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
}

/* ---------------- FILE ---------------- */

#file-input{
  display:none;
}

/* ---------------- MOBILE ---------------- */

@media(max-width:700px){
  .arc-text{
    width:320px;
    height:140px;
  }

  .arc{
    font-size:34px;
  }
}

</style>
</head>

<body>

<!-- TOP MARQUEE -->
<div class="top">
  <div class="marquee">
    An open audio archive for collective field recordings — each upload becomes part of a drifting sonic memory system — a continuous listening space between voices, places and time —
  </div>
</div>

<!-- CENTER -->
<div class="wrap">

  <!-- SEND CALL (CONCAVE) -->
  <div class="action" onclick="document.getElementById('file-input').click()">

    <svg viewBox="0 0 400 200" class="arc-text">
      <defs>
        <path id="sendPath"
          d="M 20 160 Q 200 20 380 160" />
      </defs>

      <text class="arc">
        <textPath href="#sendPath" startOffset="50%" text-anchor="middle">
          SEND CALL
        </textPath>
      </text>
    </svg>

    <div class="sub">hochladen deines rufs</div>
  </div>

  <!-- CALL BACK (CONVEX) -->
  <div class="action" id="play-action" onclick="togglePlay()">

    <svg viewBox="0 0 400 200" class="arc-text">
      <defs>
        <path id="backPath"
          d="M 20 40 Q 200 180 380 40" />
      </defs>

      <text class="arc">
        <textPath href="#backPath" startOffset="50%" text-anchor="middle">
          CALL BACK
        </textPath>
      </text>
    </svg>

    <div class="sub">horche dein echo</div>
  </div>

</div>

<!-- BOTTOM BAR -->
<div class="bottom">

  <div>MANUEL PHIL. BISCHOF</div>

  <div class="bottom-center">
    FÜR HALTESTELLENSCHWÄRMEREI
  </div>

  <div>2026</div>

</div>

<!-- FILE INPUT -->
<input type="file" id="file-input" accept="audio/*" multiple />

<script>

// ---------------- AUDIO SYSTEM ----------------

const WORKER_URL =
"https://audio-api.manuelbischof-phil.workers.dev/";

const BUCKET_PUBLIC_URL =
"https://pub-f2d160b705314fd1afd1421680f3cb6a.r2.dev";

let trackList = [];
let currentAudio = null;
let isPlaying = false;
let interval;

const fileInput = document.getElementById("file-input");

async function load(){

  try{

    const res = await fetch(`${WORKER_URL}/list`);
    if(!res.ok) return;

    const data = await res.json();

    trackList = data.files.map(n => ({
      name:n,
      url:`${BUCKET_PUBLIC_URL}/${encodeURIComponent(n)}`
    }));

  }catch(e){}

}

load();

fileInput.addEventListener("change", () => {
  [...fileInput.files].forEach(upload);
  fileInput.value = "";
});

async function upload(file){

  await fetch(`${WORKER_URL}/upload/${encodeURIComponent(file.name)}`,{
    method:"PUT",
    body:file
  });

  trackList.push({
    name:file.name,
    url:`${BUCKET_PUBLIC_URL}/${encodeURIComponent(file.name)}`
  });

}

function togglePlay(){
  isPlaying ? stop() : play();
}

function play(){

  if(!trackList.length) return;

  stop();

  const track = trackList[Math.floor(Math.random()*trackList.length)];
  const audio = new Audio(track.url);

  currentAudio = audio;

  audio.addEventListener("loadedmetadata", () => {

    const start = Math.random() * Math.max(0, audio.duration - 30);

    audio.currentTime = start;
    audio.play();

    isPlaying = true;

    interval = setInterval(() => {
      if(audio.currentTime - start >= 30) stop();
    }, 500);

  });

  audio.addEventListener("ended", stop);
}

function stop(){
  if(currentAudio){
    currentAudio.pause();
    currentAudio = null;
  }
  clearInterval(interval);
  isPlaying = false;
}

</script>

</body>
</html>
