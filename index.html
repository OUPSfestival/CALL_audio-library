<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Haltestellenschwärmerei</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&display=swap" rel="stylesheet">

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3CradialGradient id='g' cx='50%25' cy='50%25' r='60%25'%3E%3Cstop offset='0%25' stop-color='%23ff6b6b'/%3E%3Cstop offset='100%25' stop-color='%23a01414'/%3E%3C/radialGradient%3E%3C/defs%3E%3Cellipse cx='50' cy='50' rx='42' ry='26' fill='url(%23g)'/%3E%3C/svg%3E">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html, body{
  width:100%;
  margin:0;
  padding:0;
  background:#2e5988;
  color:#111;
  font-family:'Inter',sans-serif;

  overflow-x:hidden;
  overflow-y:auto;
  scroll-behavior:smooth;
}

/* TOP */
.top{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  padding:48px 0 18px 0;
  z-index:30;
  overflow:hidden;
}

.marquee{
  white-space:nowrap;
  font-size:20px;
  padding-left:100%;
  animation:scroll 30s linear infinite;
}

@keyframes scroll{
  0%{transform:translateX(0);}
  100%{transform:translateX(-100%);}
}

/* MAIN */
.wrap{
  min-height:100vh;

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;

  gap:30px;
  text-align:center;

  padding:140px 20px 60px;
}

/* ACTION */
.action{
  cursor:pointer;
  transition:.25s ease;
}

.action:hover{
  opacity:.75;
}

/* ARC */
.arc-text{
  width:580px;
  max-width:100%;
  height:300px;
}

.arc-big{
  font-size:66px;
  fill:#111;
  font-weight:800;
}

.arc-small{
  font-size:17px;
  fill:#bfbb99;
  opacity:.8;
}

/* SCROLL IMAGES */
.scroll-section{
  width:100%;
  padding:80px 0;
}

.bottom-images{
  width:100%;
}

.bottom-images img{
  width:100%;
  display:block;

  opacity:0;
  transform:translateY(80px);
  filter:blur(8px);

  transition:1.2s ease;
  will-change:transform,opacity,filter;
}

.bottom-images img.show{
  opacity:1;
  transform:translateY(0);
  filter:blur(0);
}

/* BOTTOM */
.bottom{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  padding:22px 28px;
  display:flex;
  justify-content:space-between;
  font-size:11px;
}

/* RECORD */
#recordBtn{
  position:fixed;
  top:18px;
  right:18px;
  width:16px;
  height:16px;
  border-radius:50%;
  background:red;
  z-index:9999;
  cursor:pointer;
  box-shadow:0 0 10px rgba(255,0,0,0.6);
}

#recordBtn.recording{
  background:darkred;
  transform:scale(1.2);
}

/* TOAST */
#toast{
  position:fixed;
  bottom:60px;
  left:50%;
  transform:translateX(-50%) translateY(20px);
  background:#111;
  color:#bfbb99;
  font-size:12px;
  font-weight:600;
  letter-spacing:0.15em;
  text-transform:uppercase;
  padding:12px 28px;
  opacity:0;
  transition:0.3s;
  pointer-events:none;
}

#toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

/* PLAY STATE */
#callBackAction.playing .arc-big{
  fill:#bfbb99;
}

</style>
</head>

<body>

<div id="recordBtn"></div>

<div class="top">
  <div class="marquee">
    Lade deinen Ruf als Sprachnachricht hoch und teile ihn mit uns. Über CALL BACK hörst du ein Echo.
  </div>
</div>

<div class="wrap">

  <div class="action" onclick="document.getElementById('file-input').click()">
    <svg viewBox="0 0 400 260" class="arc-text">
      <path id="sendPath" d="M 20 40 Q 200 240 380 40"/>
      <text class="arc-big">
        <textPath href="#sendPath" startOffset="50%" text-anchor="middle">SEND CALL</textPath>
      </text>
      <text class="arc-small">
        <textPath href="#sendPath" startOffset="50%" text-anchor="middle">Schicke deinen Ruf in die digitalen Täler</textPath>
      </text>
    </svg>
  </div>

  <div class="action" id="callBackAction" onclick="togglePlay()">
    <svg viewBox="0 0 400 260" class="arc-text">
      <path id="backPath" d="M 20 240 Q 200 20 380 240"/>
      <text class="arc-big">
        <textPath href="#backPath" startOffset="50%" text-anchor="middle">CALL BACK</textPath>
      </text>
      <text class="arc-small">
        <textPath href="#backPath" startOffset="50%" text-anchor="middle">nun höre dein Echo</textPath>
      </text>
    </svg>
  </div>

</div>

<div class="scroll-section">
  <div class="bottom-images">
    <img src="images/call1.png">
    <img src="images/call2.png">
  </div>
</div>

<div class="bottom">
  <div>MANUEL PHIL. BISCHOF</div>
  <div>FÜR HALTESTELLENSCHREIEREI</div>
  <div>2026</div>
</div>

<input type="file" id="file-input" accept="audio/*">
<div id="toast"></div>

<script>

const WORKER_URL = "https://audio-api.manuelbischof-phil.workers.dev";
const BUCKET_PUBLIC_URL = "https://pub-f2d160b705314fd1afd1421680f3cb6a.r2.dev";

let trackList = [];
let currentAudio = null;
let isPlaying = false;
let hasPlayed = sessionStorage.getItem("hasPlayed") === "true";

async function loadTracks(){
  try{
    const res = await fetch(`${WORKER_URL}/list`);
    const data = await res.json();
    trackList = data.files.map(name => ({
      name,
      url: `${BUCKET_PUBLIC_URL}/${name}`
    }));
  }catch(e){}
}
window.addEventListener("load", loadTracks);

document.getElementById("file-input").addEventListener("change", async function(){
  const file = this.files[0];
  if(!file) return;

  const filename = "upload-" + Date.now() + "-" + file.name;

  try{
    const res = await fetch(`${WORKER_URL}/upload/${encodeURIComponent(filename)}`,{
      method:"PUT",
      body:file,
      headers:{ "Content-Type": file.type }
    });

    if(!res.ok) throw new Error();

    trackList.push({
      name:filename,
      url:`${BUCKET_PUBLIC_URL}/${encodeURIComponent(filename)}`
    });

    showToast("Call is out");

  }catch(e){
    showToast("Upload failed");
  }
});

function stopClip(){
  if(currentAudio){
    currentAudio.pause();
    currentAudio = null;
  }
  isPlaying = false;
}

function lock(){
  hasPlayed = true;
  sessionStorage.setItem("hasPlayed","true");
  showToast("we are here not to consume");
  document.getElementById("callBackAction").style.opacity="0.3";
}

function playRandom(){
  if(hasPlayed){
    showToast("we are here not to consume");
    return;
  }

  const track = trackList[Math.floor(Math.random()*trackList.length)];
  if(!track) return;

  const audio = new Audio(track.url);
  currentAudio = audio;
  isPlaying = true;

  audio.onended = () => {
    stopClip();
    lock();
  };

  audio.play().catch(()=>showToast("blocked"));
}

function togglePlay(){
  if(isPlaying) stopClip();
  else playRandom();
}

const imgs = document.querySelectorAll(".bottom-images img");
const obs = new IntersectionObserver(e=>{
  e.forEach(x=>{
    if(x.isIntersecting) x.target.classList.add("show");
  });
},{threshold:0.2});
imgs.forEach(i=>obs.observe(i));

function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2500);
}

</script>

</body>
</html>
